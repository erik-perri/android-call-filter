name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  # Required to create the GitHub release and upload the APK
  contents: write
  # Required to request the OIDC token for build attestation
  id-token: write
  # Required to persist the build provenance attestation
  attestations: write
  # Required for artifact storage record creation
  artifact-metadata: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-java

      # Extract VERSION_NAME (e.g. "1.2.3") and VERSION_CODE (e.g. 1002003)
      # from the git tag (e.g. "v1.2.3"). VERSION_CODE uses the formula
      # major*1000000 + minor*1000 + patch so it is always increasing.
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION_NAME=$TAG" >> "$GITHUB_OUTPUT"

          CODE=$(echo "$TAG" | awk -F. '{print $1 * 1000000 + $2 * 1000 + $3}')
          echo "VERSION_CODE=$CODE" >> "$GITHUB_OUTPUT"

          echo "Version name: $TAG"
          echo "Version code: $CODE"

      # The keystore is stored as a base64-encoded environment secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release-keystore.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PVERSION_NAME=${{ steps.version.outputs.VERSION_NAME }} \
            -PVERSION_CODE=${{ steps.version.outputs.VERSION_CODE }}

      - name: Rename APK
        id: apk
        run: |
          APK_NAME="call-filter-${{ steps.version.outputs.VERSION_NAME }}.apk"
          mv app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_OUTPUT"

      # Generates attestation for the APK, allowing users to verify the binary
      # was built by this workflow. Skipped for private repos since that is not
      # supported.
      - name: Attest build provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.apk.outputs.APK_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.apk.outputs.APK_NAME }}
